package:
  name: uuid
  version: "0.1.1"

source:
  path: .

build:
  script:
    - mkdir -p $PREFIX/lib/mojo
    - cp -r uuid $PREFIX/lib/mojo/

requirements:
  host:
    - mojo ==1.0.0b1
  run:
    - mojo ==1.0.0b1

about:
  summary: Fast UUID v4 and v7 generation for Mojo with SIMD-accelerated hex encoding
  license: MIT
